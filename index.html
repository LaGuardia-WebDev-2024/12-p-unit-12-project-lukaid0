<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite movie?
        <select id="movie-answer">
          <option value="movie1">interstellar</option>
          <option value="movie2">wolf of wall st</option>
          <option value="movie3">shrek</option>
          <option value="movie4">the bee movie</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- food Question -->
    <form id="food-form">
      <label>
        🍕 What is my favorite food?
        <select id="food-answer">
          <option value="food1">steak</option>
          <option value="food2">burger</option>
          <option value="food3">chicken</option>
          <option value="food4">pizza</option>
        </select>
      </label>
      <button type="submit">Check food Answer</button>
    </form>
    <div id="food-result">
      <p id="food-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YESSSS!");
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================food Question jQuery Code
      $("#food-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#food-answer");
        var answer = $answer.val();

        if (answer === "food1") {
          $("#food-text").text("YESSSS!");
        } 
        else {
          $("#food-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
